<header class="site-header">

  <a href="/pages/home/home.html" class="site-header__logo" aria-label="Ir al inicio">
    <img src="assets/images/logo_el_arte_sas.png" alt="El Artesanal S.A.S." class="site-header__logo-img">
  </a>

  <!-- Checkbox invisible que controla la apertura del menú, sin JavaScript -->
  <input type="checkbox" id="menu-toggle" class="site-header__toggle-input">

  <label for="menu-toggle" class="site-header__toggle" aria-label="Abrir menú de navegación">
    <span class="site-header__toggle-icon"></span>
  </label>

  <nav class="site-nav">
    <ul class="site-nav__list">
      <li class="site-nav__item">
        <a href="/pages/home/home.html" class="site-nav__link site-nav__link--active">Inicio</a>
      </li>
      <li class="site-nav__item">
        <a href="/pages/products/products.html" class="site-nav__link">Productos</a>
      </li>
      <li class="site-nav__item">
        <a href="/pages/customized/customized.html" class="site-nav__link">Personalizados</a>
      </li>
      <li class="site-nav__item">
        <a href="/pages/contact/contact.html" class="site-nav__link">Contacto</a>
      </li>
      <!-- Agrega aquí más <li class="site-nav__item"> sin romper el diseño: la lista es flexible y se ajusta sola -->
    </ul>

    <ul class="site-nav__actions">
      <li class="site-nav__action-item">
        <a href="/pages/cart/cart.html" class="site-nav__action-link">
          <img src="assets/svg/shopping-cart.svg" alt="" class="site-nav__action-icon">
          <span>Carrito</span>
        </a>
      </li>
      <li class="site-nav__action-item">
        <a href="/pages/login/login.html" class="site-nav__action-link">
          <img src="assets/svg/user-circle.svg" alt="" class="site-nav__action-icon">
          <span>Mi cuenta</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Fondo semitransparente: al hacer clic afuera del menú, este label vuelve a marcar/desmarcar el checkbox y lo cierra -->
  <label for="menu-toggle" class="site-nav__backdrop" aria-hidden="true"></label>

  <ul class="site-header__icons">
    <li class="site-header__icon-item">
      <a href="/pages/cart/cart.html" aria-label="Carrito">
        <img src="assets/svg/shopping-cart.svg" alt="" class="site-header__icon-img">
      </a>
    </li>
    <li class="site-header__icon-item">
      <a href="/pages/login/login.html" aria-label="Mi cuenta">
        <img src="assets/svg/user-circle.svg" alt="" class="site-header__icon-img">
      </a>
    </li>
  </ul>

</header>
