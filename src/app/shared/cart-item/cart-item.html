<!--
  Componente reutilizable: se copia este bloque por cada producto dentro del carrito.
  Cambian: imagen, categoría, nombre, descripción, cantidad y precio.
-->
<article class="cart-item">
  <figure class="cart-item__img-wrap">
    <img
      src="assets/images/dy30203.png"
      alt="Bandeja de madera con patas para servir el desayuno"
      class="cart-item__img"
    />
  </figure>

  <div class="cart-item__body">
    <div class="cart-item__top">
      <div class="cart-item__info">
        <p class="cart-item__category">Cajas y bandejas</p>
        <h3 class="cart-item__name">Bandeja de desayuno</h3>
        <p class="cart-item__desc">
          Bandeja con patas para desayunos especiales, ideal para sorprender con presentaciones elegantes y disfrutar momentos únicos.
        </p>
      </div>

      <button type="button" class="cart-item__delete" aria-label="Eliminar producto del carrito">✕</button>
    </div>

    <div class="cart-item__bottom">
      <div class="qty-control">
        <button type="button" class="qty-control__btn" aria-label="Disminuir cantidad">−</button>
        <span class="qty-control__value">1</span>
        <button type="button" class="qty-control__btn" aria-label="Aumentar cantidad">+</button>
      </div>

      <p class="cart-item__price">
        <span class="cart-item__amount">$12.500</span>
        <span class="cart-item__currency">COP</span>
      </p>
    </div>
  </div>
</article>
