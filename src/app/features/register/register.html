<main class="auth-page">
  <div class="auth">

    <figure class="auth__visual">
      <img src="assets/images/log_in-Register.jpg" alt="Grabado láser artesanal" class="auth__visual-img">
      <div class="auth__visual-overlay">
        <h2 class="auth__visual-title">Precisión en cada trazo. Arte en cada grabado.</h2>
        <p class="auth__visual-slogan">
          Únete a una comunidad de diseñadores y creadores que valoran la calidez de los materiales naturales
          combinada con la precisión digital.
        </p>
      </div>
    </figure>

    <div class="auth__panel">
      <h1 class="auth__title">Crea tu cuenta</h1>
      <p class="auth__subtitle">Empieza tu viaje artesanal hoy mismo.</p>

      <form class="auth-form" action="">

        <!-- ===== Datos de la cuenta (modelo User) ===== -->

        <label class="auth-form__label" for="full-name">Nombre completo</label>
        <input
          class="auth-input"
          type="text"
          id="full-name"
          name="name"
          placeholder="Ej. Julián Casablancas"
          pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$"
          minlength="2"
          maxlength="50"
          required
        >
        <p class="auth-form__hint">Solo letras y espacios, entre 2 y 50 caracteres.</p>

        <label class="auth-form__label" for="nickname">Nickname</label>
        <input
          class="auth-input"
          type="text"
          id="nickname"
          name="nickname"
          placeholder="julian_cs"
          pattern="^[a-zA-Z0-9]+$"
          minlength="3"
          maxlength="20"
          required
        >
        <p class="auth-form__hint">Solo letras y números, sin espacios ni tildes. Será tu usuario público.</p>

        <label class="auth-form__label" for="email">Correo electrónico</label>
        <input
          class="auth-input"
          type="email"
          id="email"
          name="email"
          placeholder="julian@ejemplo.com"
          required
        >

        <div class="auth-row-two">
          <div class="auth-field-group">
            <label class="auth-form__label" for="password">Contraseña</label>
            <input class="auth-input" type="password" id="password" name="password" placeholder="••••••••" minlength="8" required>
          </div>
          <div class="auth-field-group">
            <label class="auth-form__label" for="confirm-password">Confirmar</label>
            <input class="auth-input" type="password" id="confirm-password" name="confirmPassword" placeholder="••••••••" minlength="8" required>
          </div>
        </div>

        <label class="auth-form__label" for="avatar-input">Foto de perfil</label>
        <div class="auth-avatar">
          <span class="auth-avatar__preview" aria-hidden="true">Sin foto</span>
          <input type="file" id="avatar-input" name="avatar" accept="image/*" class="auth-avatar__input">
          <label for="avatar-input" class="auth-avatar__label">Subir foto (opcional)</label>
        </div>

        <div class="auth-checkbox-row">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms">
            Acepto los <a routerLink="">términos de servicio</a> y la política de privacidad.
          </label>
        </div>

        <!-- ===== Dirección de envío, opcional (modelo Contact) ===== -->

        <input type="checkbox" id="toggle-shipping" class="auth-toggle-input">
        <label for="toggle-shipping" class="auth-toggle-label">Agregar una dirección de envío (opcional)</label>

        <div class="auth-collapsible">
          <fieldset class="auth-collapsible__inner">

            <label class="auth-form__label" for="contact-label">Etiqueta</label>
            <input class="auth-input" type="text" id="contact-label" name="contactLabel" placeholder="Ej. Casa, Trabajo" maxlength="30">

            <label class="auth-form__label" for="receiver-name">Nombre de quien recibe</label>
            <input class="auth-input" type="text" id="receiver-name" name="receiverName" placeholder="Ej. Julián Casablancas" minlength="2" maxlength="50">

            <label class="auth-form__label" for="address">Dirección de entrega</label>
            <input class="auth-input" type="text" id="address" name="address" placeholder="Cra 10 # 13 - 07 sur" minlength="5">

            <label class="auth-form__label" for="contact-phone">Teléfono de contacto</label>
            <input class="auth-input" type="tel" id="contact-phone" name="contactPhone" placeholder="+57 301 000 0000" pattern="^[+0-9\s-]+$">

            <div class="auth-checkbox-inline">
              <input type="checkbox" id="is-default-address" name="isDefault">
              <label for="is-default-address">Establecer como dirección principal</label>
            </div>

          </fieldset>
        </div>

        <button type="submit" class="button button--primary auth-submit">Crear mi cuenta</button>

      </form>

      <div class="auth-switch">
        <p class="auth-switch__question">¿Ya tienes cuenta?</p>
        <a class="auth-switch__link" routerLink="/login">Iniciar sesión</a>
      </div>
    </div>

  </div>
</main>
